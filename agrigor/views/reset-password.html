<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agrigor – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/agrigor.css"/>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="wheat-deco left">
  <div class="stalk" style="height:175px;animation-delay:0s"></div>
  <div class="stalk" style="height:215px;animation-delay:0.28s"></div>
</div>
<div class="wheat-deco right">
  <div class="stalk" style="height:195px;animation-delay:0.18s"></div>
  <div class="stalk" style="height:230px;animation-delay:0.02s"></div>
</div>

<div class="card-wrap">
  <div class="card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 34 34" fill="none"><path d="M17 28V10" stroke="#fefae0" stroke-width="2" stroke-linecap="round"/><path d="M17 16C17 16 12 14 10 9C15 8 19 11 17 16Z" fill="#a5d6a7"/><path d="M17 20C17 20 22 17 25 12C20 11 16 14 17 20Z" fill="#81c784"/><circle cx="17" cy="8" r="2.5" fill="#d4a373"/><path d="M10 29 Q17 25 24 29" stroke="#a5d6a7" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
      </div>
      <div class="logo-title">Agri<span>gor</span></div>
      <div class="logo-sub">Set a New Password</div>
    </div>

    <div class="inline-alert" id="inlineAlert">
      <svg id="inlineAlertIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
      <span id="inlineAlertMsg"></span>
    </div>

    <form class="form" id="resetForm" novalidate>
      <input type="hidden" id="resetToken" name="token"/>

      <div>
        <label class="field-label" for="password">New Password</label>
        <div class="input-wrap">
          <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar" id="strengthBar"><span></span><span></span><span></span><span></span></div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="field-error" id="passErr">Password must be at least 8 characters.</div>
      </div>

      <div>
        <label class="field-label" for="confirmPassword">Confirm New Password</label>
        <div class="input-wrap">
          <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat new password" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Toggle">
            <svg id="eyeIconConfirm" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error" id="confirmErr">Passwords do not match.</div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">Reset Password</span>
      </button>
    </form>

    <div class="card-footer">© 2025 Agrigor · Cultivating Tomorrow</div>
  </div>
</div>

<script src="/js/agrigor.js"></script>
<script>
  // Read token from URL: /reset-password?token=abc123
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    showInlineAlert('Invalid or expired reset link. Please request a new one.', 'error');
    setTimeout(() => { window.location.href = '/forgot-password'; }, 3000);
  }
  document.getElementById('resetToken').value = token;

  initPasswordToggle('password',        'togglePw',      'eyeIcon');
  initPasswordToggle('confirmPassword', 'toggleConfirm', 'eyeIconConfirm');

  document.getElementById('password').addEventListener('input', function() {
    updateStrengthBar('strengthBar', 'strengthLabel', this.value);
    clearField('password', 'passErr');
  });
  document.getElementById('confirmPassword').addEventListener('input', () => clearField('confirmPassword', 'confirmErr'));

  document.getElementById('resetForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideInlineAlert();

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;

    let valid = true;
    if (password.length < 8) { setFieldError('password', 'passErr', true, 'Password must be at least 8 characters.'); valid = false; }
    if (password !== confirm) { setFieldError('confirmPassword', 'confirmErr', true); valid = false; }
    if (!valid) return;

    setLoading('submitBtn', true, 'Resetting…');

    try {
      const res  = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        showToast('Password reset!', 'You can now sign in with your new password.', 'success', 4000);
        setTimeout(() => { window.location.href = '/login?success=reset'; }, 1500);
      } else {
        const msg = data.message || 'Reset failed. The link may have expired.';
        showInlineAlert(msg, 'error');
        showToast('Error', msg, 'error');
        setLoading('submitBtn', false);
      }
    } catch {
      const msg = 'Cannot reach the server. Check your connection.';
      showInlineAlert(msg, 'error');
      showToast('Connection error', msg, 'error');
      setLoading('submitBtn', false);
    }
  });
</script>
</body>
</html>
