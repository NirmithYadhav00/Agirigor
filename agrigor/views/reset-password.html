<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  showInlineAlert('Invalid or expired reset link. Please request a new one.', 'error');
  setTimeout(() => { window.location.href = '/forgot-password'; }, 3000);
} else {
  document.getElementById('resetToken').value = token;
}

initPasswordToggle('password', 'togglePw', 'eyeIcon');
initPasswordToggle('confirmPassword', 'toggleConfirm', 'eyeIconConfirm');

document.getElementById('password').addEventListener('input', function() {
  updateStrengthBar('strengthBar', 'strengthLabel', this.value);
  clearField('password', 'passErr');
});

document.getElementById('confirmPassword').addEventListener('input', () =>
  clearField('confirmPassword', 'confirmErr')
);

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  hideInlineAlert();

  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirmPassword').value;

  let valid = true;

  if (password.length < 8) {
    setFieldError('password', 'passErr', true, 'Password must be at least 8 characters.');
    valid = false;
  }

  if (password !== confirm) {
    setFieldError('confirmPassword', 'confirmErr', true);
    valid = false;
  }

  if (!valid) return;

  setLoading('submitBtn', true, 'Resetting…');

  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: JSON.stringify({ token, password })
    });

    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      document.getElementById('submitBtn').disabled = true;
      showToast('Password reset!', 'You can now sign in with your new password.', 'success', 4000);
      setTimeout(() => { window.location.href = '/login?success=reset'; }, 1500);
    } else {
      const msg = data.message || 'Reset failed. The link may have expired.';
      showInlineAlert(msg, 'error');
      showToast('Error', msg, 'error');
      setLoading('submitBtn', false);
    }
  } catch {
    const msg = 'Cannot reach the server. Check your connection.';
    showInlineAlert(msg, 'error');
    showToast('Connection error', msg, 'error');
    setLoading('submitBtn', false);
  }
});
</script>
